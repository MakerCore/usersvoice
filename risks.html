<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部风险信号 | iNew3D User Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0A0A0A; color: #E5E5E5; }
        .lemon { color: #CCFF00; }
        .bg-lemon { background: #CCFF00; color: #000; }
        .card { background: #141414; border: 1px solid #262626; }
        .risk-border { border-left: 3px solid #FF4444; }
        .tag-red { background: rgba(255, 68, 68, 0.1); color: #FF4444; border: 1px solid rgba(255, 68, 68, 0.3); }
    </style>
</head>
<body class="min-h-screen p-3 md:p-6 max-w-6xl mx-auto">

    <div class="card rounded-2xl p-4 md:p-6 mb-6">
        <a href="index.html" class="text-gray-500 text-sm hover:text-[#CCFF00] mb-2 inline-block">← 返回首页</a>
        <h1 class="text-2xl md:text-4xl font-bold">全部风险信号</h1>
        <p class="text-gray-400 mt-2 text-sm">可能导致用户取消订单的顾虑与担忧（按风险等级排序）</p>
        
        <!-- 筛选 -->
        <div class="flex gap-2 mt-4">
            <button onclick="filter('all')" class="filter-btn bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-sm" data-level="all">全部风险</button>
            <button onclick="filter('高')" class="filter-btn px-4 py-2 rounded-lg font-bold text-sm bg-gray-800 text-gray-400" data-level="高">高风险</button>
            <button onclick="filter('中')" class="filter-btn px-4 py-2 rounded-lg font-bold text-sm bg-gray-800 text-gray-400" data-level="中">中风险</button>
            <button onclick="filter('低')" class="filter-btn px-4 py-2 rounded-lg font-bold text-sm bg-gray-800 text-gray-400" data-level="低">低风险</button>
        </div>
    </div>

    <div id="risk-list" class="space-y-4 mb-6"></div>

    <div class="card rounded-2xl p-6 text-sm text-center">
        <p class="text-gray-500">共 <span id="total-count" class="text-red-400">0</span> 条风险数据 | 作者：<span class="lemon">Lemon.Wang</span></p>
    </div>

    <script>
        const CONFIG = {
            SUPABASE_URL: 'https://brzxjzucucgzlkhlndcw.supabase.co',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyenhqenVjdWNnemxraGxuZGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTQ0MjUsImV4cCI6MjA4ODc3MDQyNX0.-lJM8durJHHijxz-IxpzLyUqGRyfXcb2vV2ng4r3vFc'
        };
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        let allData = [];
        let currentFilter = 'all';

        async function loadData() {
            const { data, error } = await supabaseClient.from('user_voices').select('*').order('risk_level', { ascending: false });
            if (error) return;
            // 筛选风险数据：risk_level有值或emotion=negative或type=risk
            allData = data.filter(d => d.risk_level || d.emotion === 'negative' || d.type === 'risk');
            document.getElementById('total-count').textContent = allData.length;
            render();
        }

        function render() {
            const filtered = currentFilter === 'all' ? allData : allData.filter(d => d.risk_level === currentFilter);
            document.getElementById('risk-list').innerHTML = filtered.map(item => `
                <div class="risk-border bg-red-950/10 rounded-lg p-4 md:p-6 card">
                    <p class="text-gray-200 italic mb-4 text-base leading-relaxed">"${item.text}"</p>
                    <div class="flex flex-wrap gap-2 mb-4 text-xs">
                        <span class="px-2 py-1 bg-gray-800 rounded text-gray-300">${item.persona || '未分类'}</span>
                        <span class="px-2 py-1 bg-gray-800 rounded text-red-400">${item.emotion}</span>
                        ${item.risk_level ? `<span class="px-2 py-1 tag-red rounded font-bold">风险等级：${item.risk_level}</span>` : ''}
                        ${item.type === 'risk' ? '<span class="px-2 py-1 bg-red-900/50 text-red-400 rounded">取消意向</span>' : ''}
                    </div>
                    <div class="grid md:grid-cols-3 gap-4 text-sm pt-4 border-t border-gray-800">
                        <div><span class="text-gray-500 text-xs block mb-1">顾虑点</span><span class="text-white">${item.pain_points || '-'}</span></div>
                        <div><span class="text-gray-500 text-xs block mb-1">涉及场景</span><span class="text-white">${item.use_case || '-'}</span></div>
                        <div><span class="text-gray-500 text-xs block mb-1">需改进能力</span><span class="text-red-400">${item.decision_factors || '-'}</span></div>
                    </div>
                </div>
            `).join('');
        }

        function filter(level) {
            currentFilter = level;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.level === level) {
                    btn.classList.remove('bg-gray-800', 'text-gray-400');
                    btn.classList.add('bg-red-500', 'text-white');
                } else {
                    btn.classList.remove('bg-red-500', 'text-white');
                    btn.classList.add('bg-gray-800', 'text-gray-400');
                }
            });
            render();
        }

        loadData();
    </script>
</body>
</html>
