<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNew3D Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0A0A0A; color: #E5E5E5; }
        .lemon { color: #CCFF00; }
        .card { background: #141414; border: 1px solid #262626; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .quote { border-left: 3px solid #CCFF00; padding-left: 16px; margin: 16px 0; }
        .risk { border-left: 3px solid #FF4444; padding-left: 16px; margin: 16px 0; }
    </style>
</head>
<body class="p-4 max-w-3xl mx-auto">

<!-- 顶部数据 -->
<div class="card">
    <h1 class="text-3xl font-bold mb-2">iNew3D Full Color <span class="lemon">3D Printer</span></h1>
    <p class="text-gray-400 text-sm mb-4">最后更新：<span id="update-time">加载中...</span></p>
    
    <div class="grid grid-cols-3 gap-4 text-center">
        <div>
            <div class="text-3xl font-bold lemon" id="backers">-</div>
            <div class="text-xs text-gray-400">Backers</div>
        </div>
        <div>
            <div class="text-3xl font-bold" id="pledged">-</div>
            <div class="text-xs text-gray-400">已筹金额</div>
        </div>
        <div>
            <div class="text-3xl font-bold" id="days">-</div>
            <div class="text-xs text-gray-400">剩余天数</div>
        </div>
    </div>
</div>

<!-- 用户声音 -->
<div class="card">
    <h2 class="text-xl font-bold mb-4">用户原话精选</h2>
    <div id="voices">
        <div class="quote">
            <p class="text-gray-200 italic mb-2">"加载中..."</p>
            <p class="text-xs text-gray-500">来源：-</p>
        </div>
    </div>
</div>

<script>
  // ==================== 你的 Supabase 配置 ====================
  const SUPABASE_URL = 'https://brzxjzucucgzlkhlndcw.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyenhqenVjdWNnemxraGxuZGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTQ0MjUsImV4cCI6MjA4ODc3MDQyNX0.-lJM8durJHHijxz-IxpzLyUqGRyfXcb2vV2ng4r3vFc';
  
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
  async function loadVoiceData() {
    try {
      const { data, error } = await supabaseClient
        .from('user_voices')
        .select('text, source')
        .limit(1);
      
      if (error) {
        console.error('Error:', error);
        document.querySelector('#voices .quote p:first-child').textContent = '"加载失败: ' + error.message + '"';
        return;
      }
      
      console.log('Data from Supabase:', data); // 调试用的
      
      if (data && data.length > 0) {
        // 直接更新 div#voices 里面的内容
        const voicesDiv = document.getElementById('voices');
        voicesDiv.innerHTML = `
          <div class="quote">
            <p class="text-gray-200 italic mb-2">"${data[0].text}"</p>
            <p class="text-xs text-gray-500">来源：${data[0].source}</p>
          </div>
        `;
      } else {
        document.querySelector('#voices .quote p:first-child').textContent = '"暂无数据"';
      }
    } catch (err) {
      console.error('Exception:', err);
      document.querySelector('#voices .quote p:first-child').textContent = '"执行错误..."';
    }
  }
  
  // 页面加载完成后执行
  document.addEventListener('DOMContentLoaded', loadVoiceData);
</script>

</body>
</html>
