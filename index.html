<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNew3D Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0A0A0A; color: #E5E5E5; }
        .lemon { color: #CCFF00; }
        .card { background: #141414; border: 1px solid #262626; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .quote { border-left: 3px solid #CCFF00; padding-left: 16px; margin: 16px 0; }
        .risk { border-left: 3px solid #FF4444; padding-left: 16px; margin: 16px 0; }
    </style>
</head>
<body class="p-4 max-w-3xl mx-auto">

<!-- 顶部数据 -->
<div class="card">
    <h1 class="text-3xl font-bold mb-2">iNew3D Full Color <span class="lemon">3D Printer</span></h1>
    <p class="text-gray-400 text-sm mb-4">最后更新：<span id="update-time">加载中...</span></p>
    
    <div class="grid grid-cols-3 gap-4 text-center">
        <div>
            <div class="text-3xl font-bold lemon" id="backers">-</div>
            <div class="text-xs text-gray-400">Backers</div>
        </div>
        <div>
            <div class="text-3xl font-bold" id="pledged">-</div>
            <div class="text-xs text-gray-400">已筹金额</div>
        </div>
        <div>
            <div class="text-3xl font-bold" id="days">-</div>
            <div class="text-xs text-gray-400">剩余天数</div>
        </div>
    </div>
</div>

<!-- 用户声音 -->
<div class="card">
    <h2 class="text-xl font-bold mb-4">用户原话精选</h2>
    <div id="voices">加载中...</div>
</div>


</script>
<script>
  // ==================== REPLACE HERE ====================
  const SUPABASE_URL = 'https://brzxjzucucgzlkhlndcw.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyenhqenVjdWNnemxraGxuZGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTQ0MjUsImV4cCI6MjA4ODc3MDQyNX0.-lJM8durJHHijxz-IxpzLyUqGRyfXcb2vV2ng4r3vFc';
  // ======================================================
  
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
  async function loadVoiceData() {
    const { data, error } = await supabaseClient
      .from('user_voices')
      .select('text, source')
      .order('created_at', { ascending: false })
      .limit(1);
    
    if (error) {
      console.error('Error:', error);
      document.querySelector('.quote p.italic').textContent = '"加载失败..."';
      return;
    }
    
    if (data && data.length > 0) {
      // Update first card in "User Voice" section
      const firstQuote = document.querySelector('.quote');
      if (firstQuote) {
        const textEl = firstQuote.querySelector('p.italic');
        const sourceEl = firstQuote.querySelector('.text-xs.text-gray-500');
        
        if (textEl) textEl.textContent = '"' + data[0].text + '"';
        if (sourceEl) sourceEl.textContent = 'Source: ' + data[0].source;
      }
    }
  }
  
  // Auto-load on page open
  loadVoiceData();
</script>
</body>
</html>
